<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReelRank — Import Teams</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            navy: { 950: '#060a14', 900: '#0a0f1e', 800: '#0d1530', 700: '#1a2444', 600: '#243060' },
            forest: { 700: '#1a4731', 600: '#1e5c3a', 500: '#2d7a52', 400: '#3a9966' },
            amber: { 400: '#fbbf24', 500: '#f59e0b', 600: '#d97706' }
          }
        }
      }
    }
  </script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
</head>
<body class="bg-navy-900 text-slate-100">
  <div class="min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-navy-800 border border-navy-700 rounded-2xl p-6">
      <h1 class="text-2xl font-bold text-amber-400 mb-4">Import Teams</h1>

      <div x-data="importer" x-init="init()" class="space-y-4">
        <div class="bg-navy-900 rounded-lg p-3">
          <p class="text-sm text-slate-400" x-text="`${totalTeams} teams ready to import`"></p>
        </div>

        <button @click="importTeams()"
          class="w-full bg-forest-600 hover:bg-forest-500 text-white py-3 rounded-lg font-bold text-lg transition-colors">
          <span x-text="loading ? 'Importing...' : 'Import Teams'"></span>
        </button>

        <div x-show="error" class="bg-red-950/50 border border-red-900/50 text-red-400 p-3 rounded-lg text-sm" x-text="error"></div>
        <div x-show="success" class="bg-forest-950/50 border border-forest-900/50 text-forest-400 p-3 rounded-lg text-sm" x-text="success"></div>

        <div x-show="importedCount > 0" class="text-center text-sm text-slate-400">
          <span x-text="`✓ ${importedCount} teams imported`"></span>
        </div>
      </div>
    </div>
  </div>

  <script src="./firebase-init.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
  <script>
    document.addEventListener('alpine:init', () => {
      Alpine.data('importer', function() {
      const teamsData = [
        { teamName: "Barry Jones/ Mark Britton", angler1Name: "Barry Jones", angler2Name: "Mark Britton" },
        { teamName: "Cody Brown/ Izaak Wetzel", angler1Name: "Cody Brown", angler2Name: "Izaak Wetzel" },
        { teamName: "Gary Butcher/ Scott Smith", angler1Name: "Gary Butcher", angler2Name: "Scott Smith" },
        { teamName: "Steven Wickey/ Adam Yoder", angler1Name: "Steven Wickey", angler2Name: "Adam Yoder" },
        { teamName: "John Miller/ Ashly Miller", angler1Name: "John Miller", angler2Name: "Ashly Miller" },
        { teamName: "Edward Bontrager/ Kenneth Bontrager", angler1Name: "Edward Bontrager", angler2Name: "Kenneth Bontrager" },
        { teamName: "Marvin Yoder/ James Detweiler", angler1Name: "Marvin Yoder", angler2Name: "James Detweiler" },
        { teamName: "Ben Harrison / TJ Reed", angler1Name: "Ben Harrison", angler2Name: "TJ Reed" },
        { teamName: "Ernesto G / Tony G", angler1Name: "Ernesto G", angler2Name: "Tony G" },
        { teamName: "Jeff Jerkins / Beth Jerkins", angler1Name: "Jeff Jerkins", angler2Name: "Beth Jerkins" },
        { teamName: "Manny Swartz / Dennis Hostetler", angler1Name: "Manny Swartz", angler2Name: "Dennis Hostetler" }
      ];

      return {
        totalTeams: teamsData.length,
        loading: false,
        error: null,
        success: null,
        importedCount: 0,

        init() {
          firebase.auth().onAuthStateChanged(user => {
            if (!user) {
              this.error = 'You must be logged in as admin to import teams.';
            }
          });
        },

        async importTeams() {
          this.loading = true;
          this.error = null;
          this.success = null;
          this.importedCount = 0;

          const db = firebase.firestore();
          try {
            for (const team of teamsData) {
              await db.collection('teams').add({
                teamName: team.teamName,
                angler1: { name: team.angler1Name },
                angler2: { name: team.angler2Name },
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
              });
              this.importedCount++;
            }
            this.success = `✓ Successfully imported ${this.importedCount} teams!`;
          } catch (e) {
            this.error = `Error: ${e.message}`;
          }
          this.loading = false;
        }
      };
      });
    });
  </script>
</body>
</html>
