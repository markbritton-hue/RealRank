<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LeagueCast — BJones Fishing Channel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            navy: { 950: '#060a14', 900: '#0a0f1e', 800: '#0d1530', 700: '#1a2444', 600: '#243060' },
            forest: { 700: '#1a4731', 600: '#1e5c3a', 500: '#2d7a52', 400: '#3a9966' },
            amber: { 400: '#fbbf24', 500: '#f59e0b', 600: '#d97706' }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-navy-900 text-slate-100 min-h-screen flex flex-col">

  <nav class="bg-navy-800 border-b border-forest-700 px-4 py-3 flex items-center justify-between">
    <a href="index.html" class="text-amber-400 font-bold text-xl">🎣 LeagueCast</a>
    <a href="index.html" class="bg-navy-700 hover:bg-navy-600 text-slate-200 hover:text-amber-400 px-4 py-2 rounded-lg font-semibold text-sm border border-navy-600 hover:border-amber-400 transition-colors">← Home</a>
  </nav>

  <main class="p-4 max-w-3xl mx-auto flex-1 w-full">

    <div class="pt-4 mb-8">
      <h1 class="text-3xl font-bold text-amber-400 mb-2">BJones Fishing Channel</h1>
      <p class="text-slate-400">Latest fishing tips, tournament updates, and more from BJones</p>
    </div>

    <!-- YouTube Subscribe Button -->
    <div class="mb-8">
      <a href="https://www.youtube.com/@BJonesfishing" target="_blank" rel="noopener"
        class="inline-flex items-center gap-2 bg-red-600 hover:bg-red-700 text-white px-6 py-3 rounded-lg font-bold transition-colors shadow-lg hover:shadow-xl">
        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
          <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
        </svg>
        Subscribe on YouTube
      </a>
    </div>

    <!-- Videos Grid -->
    <div id="video-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 mb-8">
      <!-- Videos will load here -->
    </div>

    <!-- Loading State -->
    <div id="videos-loading" class="flex flex-col items-center justify-center py-12">
      <div class="w-8 h-8 border-3 border-amber-400 border-t-transparent rounded-full animate-spin mb-4"></div>
      <p class="text-slate-400">Loading latest videos...</p>
    </div>

    <!-- Error State -->
    <div id="videos-error" style="display:none" class="bg-red-950/30 border border-red-900/50 rounded-xl p-6 text-center">
      <p class="text-red-400 font-semibold mb-2">Unable to load videos</p>
      <p class="text-slate-400 text-sm">Please try again later or visit the channel directly</p>
    </div>

  </main>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var loadingEl = document.getElementById('videos-loading');
      var errorEl = document.getElementById('videos-error');
      var gridEl = document.getElementById('video-grid');

      var channelId = 'UC_example'; // Placeholder — update with actual channel ID
      var rssUrl = 'https://www.youtube.com/feeds/videos.xml?channel_id=' + channelId;
      var apiUrl = 'https://api.rss2json.com/v1/api.json?rss_url=' + encodeURIComponent(rssUrl);

      fetch(apiUrl)
        .then(function(res) {
          if (!res.ok) throw new Error('Network response ' + res.status);
          return res.json();
        })
        .then(function(data) {
          if (data.status !== 'ok' || !data.items || data.items.length === 0) {
            throw new Error('No videos found');
          }

          var allVideos = data.items.filter(function(v) {
            return v.link.indexOf('/shorts/') === -1;
          });
          var videos = allVideos.slice(0, 6);

          for (var i = 0; i < videos.length; i++) {
            var video = videos[i];
            var videoId = video.link.split('v=')[1];
            if (videoId && videoId.indexOf('&') !== -1) {
              videoId = videoId.split('&')[0];
            }
            var thumbUrl = 'https://img.youtube.com/vi/' + videoId + '/mqdefault.jpg';
            var pubDate = new Date(video.pubDate);
            var dateStr = pubDate.toLocaleDateString('en-US', {
              year: 'numeric', month: 'short', day: 'numeric'
            });

            var card = document.createElement('a');
            card.className = 'group bg-navy-800 border border-navy-700 hover:border-amber-500/50 rounded-xl overflow-hidden transition-all hover:shadow-lg hover:-translate-y-1';
            card.href = video.link;
            card.target = '_blank';
            card.rel = 'noopener';

            card.innerHTML =
              '<img class="w-full aspect-video object-cover group-hover:brightness-110 transition-all" src="' + thumbUrl + '" alt="Video thumbnail">' +
              '<div class="p-3">' +
                '<div class="font-bold text-white text-sm leading-tight line-clamp-2 group-hover:text-amber-400 transition-colors">' + escapeHtml(video.title) + '</div>' +
                '<div class="text-xs text-slate-400 mt-2">📅 ' + dateStr + '</div>' +
              '</div>';

            gridEl.appendChild(card);
          }

          loadingEl.style.display = 'none';
          gridEl.style.display = 'grid';
        })
        .catch(function(err) {
          console.error('Video load error:', err);
          loadingEl.style.display = 'none';
          errorEl.style.display = 'block';
        });

      function escapeHtml(str) {
        var div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
      }
    });
  </script>
</body>
</html>
